<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trajado Elegante Store</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Inter:wght@300;400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#0A0A0A;
  --dark:#111;
  --card:#181818;
  --border:#2A2A2A;
  --gold:#C8762A;
  --gold-light:#E8A050;
  --gold-pale:#2A1A08;
  --gold-dim:#1E1208;
  --white:#F5F0EB;
  --soft:#888;
  --muted:#555;
}
body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;}
.app{max-width:960px;margin:0 auto;}

/* HEADER */
.header{background:var(--black);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-wrap{display:flex;align-items:center;gap:10px;padding:0.9rem 0;}
.logo-icon{width:40px;height:40px;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold);}
.logo-text{line-height:1.1;}
.logo-top{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;color:var(--white);}
.logo-mid{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold);}
.logo-script{font-family:'Great Vibes',cursive;font-size:14px;color:var(--gold-light);line-height:1;}
.header-right{display:flex;align-items:center;gap:10px;}
.cart-btn{background:none;border:1px solid var(--border);color:var(--white);padding:8px 16px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;display:flex;align-items:center;gap:8px;transition:all .2s;letter-spacing:.5px;}
.cart-btn:hover{border-color:var(--gold);color:var(--gold);}
.cart-count{background:var(--gold);color:var(--black);width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.admin-btn{background:none;border:1px solid var(--muted);color:var(--soft);padding:8px 14px;cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;display:flex;align-items:center;gap:6px;transition:all .2s;letter-spacing:.5px;}
.admin-btn:hover{border-color:var(--gold);color:var(--gold);}
.admin-btn.active-panel{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}

/* CAT NAV */
.cat-nav{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;padding:0 1.5rem;scrollbar-width:none;}
.cat-nav::-webkit-scrollbar{display:none;}
.cat-btn{background:none;border:none;color:var(--soft);padding:13px 18px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.cat-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.cat-btn:hover:not(.active){color:var(--white);}

/* HERO BANNER */
.hero-banner{position:relative;width:100%;overflow:hidden;display:block;border-bottom:1px solid var(--border);}
.hero-banner-img{width:100%;display:block;max-height:520px;object-fit:cover;object-position:center top;}
.hero-overlay-btn-wrap{position:absolute;bottom:18%;left:6.5%;}
.hero-cta{background:transparent;color:var(--gold);border:1px solid var(--gold);padding:14px 32px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;cursor:pointer;transition:all .3s;font-weight:600;text-transform:uppercase;display:inline-flex;align-items:center;gap:10px;}
.hero-cta:hover{background:var(--gold);color:var(--black);}
@media(max-width:600px){
  .hero-overlay-btn-wrap{bottom:12%;left:5%;}
  .hero-cta{padding:10px 20px;font-size:9px;}
}

/* SECTION */
.section{padding:2rem 1.5rem;}
.section-header{display:flex;align-items:center;margin-bottom:1.5rem;gap:12px;}
.section-title{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:2px;color:var(--white);white-space:nowrap;}
.section-title span{color:var(--gold);}
.section-line{flex:1;height:1px;background:var(--border);}
.section-count{font-size:11px;color:var(--soft);white-space:nowrap;}

/* PRODUCT GRID */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
.prod-card{background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.prod-card:hover{border-color:var(--gold);}
.prod-badge{position:absolute;top:10px;left:10px;z-index:2;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;font-weight:500;}
.badge-new{background:var(--gold);color:var(--black);}
.badge-sale{background:#8B0000;color:#fff;}
.badge-hot{background:#333;color:var(--gold);border:1px solid var(--gold);}
.prod-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:5rem;background:#141414;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.prod-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.prod-img-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:all .25s;background:rgba(0,0,0,0);}
.prod-card:hover .prod-img-overlay{background:rgba(0,0,0,0.3);}
.quick-view{background:var(--gold);color:var(--black);border:none;padding:9px 20px;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Cinzel',serif;opacity:0;transform:translateY(8px);transition:all .2s;font-weight:600;}
.prod-card:hover .quick-view{opacity:1;transform:translateY(0);}
.prod-info{padding:1rem;}
.prod-cat{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.prod-name{font-size:13px;font-weight:500;color:var(--white);margin-bottom:8px;line-height:1.4;}
.prod-foot{display:flex;align-items:center;justify-content:space-between;}
.prod-price{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);}
.prod-old{font-size:11px;color:var(--muted);text-decoration:line-through;margin-left:5px;}
.add-btn{background:none;border:1px solid var(--border);color:var(--soft);width:32px;height:32px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.add-btn:hover{border-color:var(--gold);color:var(--gold);}

/* DETAIL */
.detail-view{padding:1.5rem;}
.detail-back{background:none;border:none;color:var(--soft);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.5px;display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;padding:0;transition:color .2s;}
.detail-back:hover{color:var(--gold);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;}
@media(max-width:600px){.detail-grid{grid-template-columns:1fr;}}
.detail-img{aspect-ratio:1;background:#141414;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:8rem;overflow:hidden;position:relative;}
.detail-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.detail-cat{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.detail-name{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:400;color:var(--white);margin-bottom:.6rem;letter-spacing:1px;line-height:1.3;}
.detail-price-wrap{display:flex;align-items:baseline;gap:10px;margin-bottom:1.2rem;}
.detail-price{font-family:'Cinzel',serif;font-size:1.8rem;color:var(--gold);}
.detail-old{font-size:14px;color:var(--muted);text-decoration:line-through;}
.detail-desc{font-size:12px;color:var(--soft);line-height:1.8;margin-bottom:1.3rem;}
.detail-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);margin-bottom:8px;}
.sizes{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.3rem;}
.size-btn{border:1px solid var(--border);background:none;color:var(--soft);padding:7px 15px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.size-btn.active{border-color:var(--gold);color:var(--gold);}
.size-btn:hover:not(.active){border-color:var(--muted);color:var(--white);}
.qty-row{display:flex;align-items:center;gap:0;margin-bottom:1.3rem;}
.qty-btn{background:none;border:1px solid var(--border);color:var(--white);width:36px;height:36px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.qty-btn:hover{border-color:var(--gold);color:var(--gold);}
.qty-val{width:52px;height:36px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;}
.add-cart-btn{width:100%;background:var(--gold);color:var(--black);border:none;padding:14px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:600;transition:all .2s;margin-bottom:10px;}
.add-cart-btn:hover{background:var(--gold-light);}
.detail-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:1rem;}
.tag{font-size:10px;padding:3px 10px;border:1px solid var(--border);color:var(--soft);}

/* CART */
.cart-view{padding:1.5rem;}
.cart-title{font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:2px;color:var(--white);margin-bottom:1.5rem;}
.cart-empty{text-align:center;padding:4rem 0;color:var(--soft);font-size:13px;}
.cart-empty i{font-size:3rem;color:var(--muted);display:block;margin-bottom:1rem;}
.cart-item{background:var(--card);border:1px solid var(--border);padding:1rem;display:flex;gap:14px;margin-bottom:10px;}
.cart-item-img{width:68px;height:68px;background:#141414;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;border:1px solid var(--border);overflow:hidden;position:relative;}
.cart-item-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:13px;font-weight:500;color:var(--white);margin-bottom:4px;}
.cart-item-meta{font-size:11px;color:var(--soft);}
.cart-item-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;}
.cart-item-price{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);}
.cart-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;transition:color .2s;padding:0;}
.cart-remove:hover{color:#e74c3c;}
.cart-summary{background:var(--card);border:1px solid var(--gold-pale);padding:1.3rem;margin-top:1.2rem;}
.summary-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;color:var(--soft);}
.summary-total{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0 0;border-top:1px solid var(--border);margin-top:8px;}
.summary-total-lbl{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--white);}
.summary-total-price{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold);}
.checkout-btn{width:100%;background:var(--gold);color:var(--black);border:none;padding:15px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:600;margin-top:1.2rem;transition:all .2s;}
.checkout-btn:hover{background:var(--gold-light);}
.whats-btn{width:100%;background:none;color:#25D366;border:1px solid #25D366;padding:13px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;margin-top:10px;transition:all .2s;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:10px;}
.whats-btn:hover{background:#25D36615;}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:1.5rem;text-align:center;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.footer span{color:var(--gold);}
.footer-logo{font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:3px;color:var(--gold);margin-bottom:.5rem;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--gold);color:var(--black);padding:12px 22px;font-size:12px;font-weight:600;letter-spacing:.5px;font-family:'Cinzel',serif;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}

/* ADMIN LOGIN */
.admin-login-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px);}
.admin-login-box{background:var(--dark);border:1px solid var(--gold-pale);padding:2.5rem;width:340px;text-align:center;}
.admin-login-logo{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:3px;color:var(--gold);margin-bottom:.3rem;}
.admin-login-sub{font-size:10px;color:var(--soft);letter-spacing:2px;margin-bottom:2rem;text-transform:uppercase;}
.admin-login-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);display:block;text-align:left;margin-bottom:6px;}
.admin-login-input{width:100%;background:#0d0d0d;border:1px solid var(--border);color:var(--white);padding:11px 14px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;margin-bottom:1.2rem;}
.admin-login-input:focus{border-color:var(--gold);}
.admin-login-btn{width:100%;background:var(--gold);color:var(--black);border:none;padding:13px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:600;transition:all .2s;}
.admin-login-btn:hover{background:var(--gold-light);}
.admin-login-err{font-size:11px;color:#e74c3c;margin-top:.7rem;min-height:18px;}
.admin-login-close{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;margin-top:1rem;letter-spacing:.5px;font-family:'Inter',sans-serif;transition:color .2s;}
.admin-login-close:hover{color:var(--white);}

/* ADMIN PANEL */
.admin-panel{position:fixed;inset:0;background:var(--black);z-index:400;overflow-y:auto;display:none;}
.admin-panel.open{display:block;}
.admin-header{background:var(--dark);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.admin-title{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:2px;color:var(--white);}
.admin-title span{color:var(--gold);}
.admin-header-right{display:flex;align-items:center;gap:10px;}
.admin-logout{background:none;border:1px solid var(--muted);color:var(--soft);padding:7px 14px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.5px;display:flex;align-items:center;gap:6px;}
.admin-logout:hover{border-color:#e74c3c;color:#e74c3c;}
.admin-close-btn{background:none;border:1px solid var(--border);color:var(--soft);padding:7px 14px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.5px;display:flex;align-items:center;gap:6px;}
.admin-close-btn:hover{border-color:var(--gold);color:var(--gold);}
.admin-body{max-width:960px;margin:0 auto;padding:1.5rem;}
.admin-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem;}
.admin-tab{background:none;border:none;color:var(--soft);padding:11px 20px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;border-bottom:2px solid transparent;transition:all .2s;}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.admin-tab:hover:not(.active){color:var(--white);}
.admin-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.admin-form-grid{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);}
.form-input,.form-select,.form-textarea{background:#0d0d0d;border:1px solid var(--border);color:var(--white);padding:11px 14px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
.form-select option{background:var(--dark);}
.form-textarea{resize:vertical;min-height:80px;}
.img-upload-area{border:2px dashed var(--border);padding:2rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:#0d0d0d;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.img-upload-area:hover{border-color:var(--gold);background:var(--gold-dim);}
.img-upload-area.has-img{border-style:solid;border-color:var(--gold);}
.img-upload-icon{font-size:2rem;color:var(--muted);margin-bottom:.7rem;}
.img-upload-text{font-size:11px;color:var(--soft);letter-spacing:.5px;}
.img-upload-hint{font-size:10px;color:var(--muted);margin-top:.3rem;}
.img-preview{width:100%;max-height:200px;object-fit:contain;margin-bottom:.5rem;}
.img-remove-btn{background:none;border:1px solid #e74c3c;color:#e74c3c;padding:5px 12px;font-size:10px;cursor:pointer;letter-spacing:.5px;font-family:'Inter',sans-serif;margin-top:.5rem;transition:all .2s;}
.img-remove-btn:hover{background:#e74c3c;color:#fff;}
#img-file-input{display:none;}
.sizes-check{display:flex;flex-wrap:wrap;gap:8px;}
.size-check-label{display:flex;align-items:center;gap:5px;border:1px solid var(--border);padding:6px 12px;cursor:pointer;font-size:11px;color:var(--soft);transition:all .2s;user-select:none;}
.size-check-label:has(input:checked){border-color:var(--gold);color:var(--gold);}
.size-check-label input{display:none;}
.admin-submit-btn{background:var(--gold);color:var(--black);border:none;padding:14px 32px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:600;transition:all .2s;margin-top:1.2rem;display:flex;align-items:center;gap:8px;}
.admin-submit-btn:hover{background:var(--gold-light);}
.admin-prod-list{display:flex;flex-direction:column;gap:10px;}
.admin-prod-item{background:var(--card);border:1px solid var(--border);padding:1rem;display:flex;gap:14px;align-items:center;transition:border-color .2s;}
.admin-prod-item:hover{border-color:var(--gold);}
.admin-prod-thumb{width:60px;height:60px;flex-shrink:0;background:#141414;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.8rem;overflow:hidden;position:relative;}
.admin-prod-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.admin-prod-info{flex:1;}
.admin-prod-name{font-size:13px;font-weight:500;color:var(--white);margin-bottom:3px;}
.admin-prod-meta{font-size:11px;color:var(--soft);}
.admin-prod-price{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);margin-right:14px;flex-shrink:0;}
.admin-delete-btn{background:none;border:1px solid var(--border);color:var(--muted);width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.admin-delete-btn:hover{border-color:#e74c3c;color:#e74c3c;}
.admin-empty{text-align:center;padding:3rem;color:var(--muted);font-size:13px;}
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:1.5rem;}
@media(max-width:500px){.admin-stats{grid-template-columns:1fr 1fr;}}
.stat-card{background:var(--card);border:1px solid var(--border);padding:1.2rem;}
.stat-val{font-family:'Cinzel',serif;font-size:1.8rem;color:var(--gold);margin-bottom:.3rem;}
.stat-lbl{font-size:10px;color:var(--soft);letter-spacing:1px;text-transform:uppercase;}
.admin-section-title{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:2px;color:var(--white);margin-bottom:1rem;padding-bottom:.7rem;border-bottom:1px solid var(--border);}
.admin-section-title span{color:var(--gold);}

@media(max-width:480px){
  .hero-bg-text{font-size:4rem;}
  .hero-title{font-size:1.4rem;}
  .products-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div class="app">

const ADMIN_PASSWORD = 'trajado2026';
let adminLoggedIn = false;

let currentImageData = null;

  {id:7,name:'Cal\u00e7a Jogger Streetwear',cat:'calcas',price:219,old:260,badge:'sale',emoji:'\ud83d\udc56',image:null,desc:'Jogger em moletom premium com bolsos funcionais. El\u00e1stico ajust\u00e1vel.',sizes:['P','M','G','GG'],tags:['Jogger','Streetwear','Conforto']},
  {id:8,name:'Cal\u00e7a Cargo T\u00e1tica',cat:'calcas',price:259,old:null,badge:'hot',emoji:'\ud83e\udeab',image:null,desc:'Cargo t\u00e1tica com m\u00faltiplos bolsos. Tecido resistente e dur\u00e1vel.',sizes:['38','40','42','44','46'],tags:['Cargo','T\u00e1tica','Urbano']},
  {id:9,name:'T\u00eanis Chunky Premium',cat:'calcados',price:389,old:450,badge:'sale',emoji:'\ud83d\udc9f',image:null,desc:'T\u00eanis chunky com solado extra alto. Couro sint\u00e9tico premium.',sizes:['38','39','40','41','42','43','44'],tags:['Chunky','Couro','Conforto']},
  {id:10,name:'Cinto Couro Leg\u00edtimo',cat:'acessorios',price:119,old:null,badge:'new',emoji:'\ud83d\udc5c',image:null,desc:'Cinto em couro leg\u00edtimo com fivela dourada. Acabamento premium.',sizes:['85cm','90cm','95cm','100cm'],tags:['Couro','Fivela','Premium']},
  {id:11,name:'\u00d3culos Retr\u00f4 Dourado',cat:'acessorios',price:159,old:190,badge:'hot',emoji:'\ud83d\udd76\ufe0f',image:null,desc:'\u00d3culos retr\u00f4 com arma\u00e7\u00e3o dourada. Lentes com prote\u00e7\u00e3o UV400.',sizes:['Unico'],tags:['Retr\u00f4','UV400','Dourado']},
  {id:12,name:'Mochila Streetwear Premium',cat:'acessorios',price:279,old:320,badge:'sale',emoji:'\ud83c\udf92',image:null,desc:'Mochila com compartimentos pr\u00e1ticos. Material resistente \u00e0 \u00e1gua.',sizes:['Unico'],tags:['Mochila','Streetwear','Funcional']},
];

function loadProducts(){
  try{ const s=localStorage.getItem('trajado_products'); if(s) return JSON.parse(s); }catch(e){}
  return defaultProducts;
}
function saveProducts(){ try{ localStorage.setItem('trajado_products',JSON.stringify(products)); }catch(e){} }

let products = loadProducts();
let cart = [];
let view = 'home';
let selectedProduct = null;
let activeCat = 'todos';
let selectedSize = {};
let qty = {};

function cartTotal(){ return cart.reduce((s,i)=>s+i.price*i.qty,0); }
function cartQty(){ return cart.reduce((s,i)=>s+i.qty,0); }
function addToCart(prod,size,q){
  const key=prod.id+'-'+(size||'');
  const ex=cart.find(i=>i.key===key);
  if(ex) ex.qty+=q;
  else cart.push({key,id:prod.id,name:prod.name,price:prod.price,emoji:prod.emoji||'\ud83d\udce6',image:prod.image||null,size,qty:q});
  updateCartCount(); showToast('Adicionado ao carrinho!');
}
function updateCartCount(){ document.getElementById('cart-count').textContent=cartQty(); }
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function getEmojiForCat(cat){
  return {bones:'\ud83e\udde2',camisetas:'\ud83d\udc55',calcas:'\ud83d\udc56',calcados:'\ud83d\udc9f',acessorios:'\ud83c\udf92'}[cat]||'\ud83d\udce6';
}
function prodImgHTML(p,sz,fs){
  if(p.image) return '<img src="'+p.image+'" alt="'+p.name+'" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;"/>';
  return '<span style="font-size:'+(fs||'5rem')+'">'+(p.emoji||getEmojiForCat(p.cat))+'</span>';
}

function render(){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===activeCat));
  document.getElementById('cart-count').textContent=cartQty();
  const el=document.getElementById('main-content');
  if(view==='home') el.innerHTML=renderHome();
  else if(view==='detail') el.innerHTML=renderDetail();
  else if(view==='cart') el.innerHTML=renderCart();
  bindEvents();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderHome(){
  const filtered=activeCat==='todos'?products:products.filter(p=>p.cat===activeCat);
  const catLabel=activeCat==='todos'?'Todos os <span>Produtos</span>':(activeCat.charAt(0).toUpperCase()+activeCat.slice(1));
  return '<div class="hero-banner"><div class="hero-bg-text">TRAJADO</div><div class="hero-badge">Cole\u00e7\u00e3o Premium 2026</div><div class="hero-title">Estilo que <span>Destaca</span></div><div class="hero-sub">Qualidade \u00b7 Elega\u0302ncia \u00b7 Atitude</div><button class="hero-cta" onclick="document.getElementById(\'produtos\').scrollIntoView({behavior:\'smooth\'})">Ver Cole\u00e7\u00e3o</button></div>'
  +'<div class="section" id="produtos"><div class="section-header"><div class="section-title">'+catLabel+'</div><div class="section-line"></div><div class="section-count">'+filtered.length+' itens</div></div><div class="products-grid">'
  +filtered.map(p=>{
    const badge=p.badge?'<div class="prod-badge badge-'+p.badge+'">'+(p.badge==='new'?'Novo':p.badge==='sale'?'Oferta':'Em Alta')+'</div>':'';
    return '<div class="prod-card" data-prod="'+p.id+'">'+badge+'<div class="prod-img">'+prodImgHTML(p)+'<div class="prod-img-overlay"><button class="quick-view" data-qv="'+p.id+'">Ver Produto</button></div></div><div class="prod-info"><div class="prod-cat">'+p.cat+'</div><div class="prod-name">'+p.name+'</div><div class="prod-foot"><div><span class="prod-price">R$'+p.price+'</span>'+(p.old?'<span class="prod-old">R$'+p.old+'</span>':'')+'</div><button class="add-btn" data-add="'+p.id+'" title="Adicionar ao carrinho">+</button></div></div></div>';
  }).join('')+'</div></div>';
}

function renderDetail(){
  const p=selectedProduct;
  const sz=selectedSize[p.id]||p.sizes[0];
  const q=qty[p.id]||1;
  return '<div class="detail-view"><button class="detail-back" id="back-btn"><i class="ti ti-arrow-left"></i> Voltar \u00e0 loja</button><div class="detail-grid"><div class="detail-img">'+prodImgHTML(p,null,'8rem')+'</div><div><div class="detail-cat">'+p.cat+'</div><div class="detail-name">'+p.name+'</div><div class="detail-price-wrap"><span class="detail-price">R$'+p.price+'</span>'+(p.old?'<span class="detail-old">R$'+p.old+'</span>':'')+'</div><div class="detail-desc">'+(p.desc||'')+'</div><div class="detail-label">Tamanho</div><div class="sizes">'+p.sizes.map(s=>'<button class="size-btn '+(s===sz?'active':'')+'" data-size="'+s+'">'+s+'</button>').join('')+'</div><div class="detail-label">Quantidade</div><div class="qty-row"><button class="qty-btn" id="qty-minus">\u2212</button><div class="qty-val">'+q+'</div><button class="qty-btn" id="qty-plus">+</button></div><button class="add-cart-btn" id="add-cart-detail"><i class="ti ti-shopping-bag"></i> Adicionar ao Carrinho \u2014 R$'+(p.price*q).toFixed(2)+'</button><div class="detail-tags">'+((p.tags||[]).map(t=>'<span class="tag">'+t+'</span>').join(''))+'</div></div></div></div>';
}

function renderCart(){
  const items=cart;
  const empty='<div class="cart-empty"><i class="ti ti-shopping-bag"></i><div>Seu carrinho est\u00e1 vazio</div><div style="margin-top:.5rem;font-size:11px;color:var(--muted)">Adicione produtos para continuar</div></div>';
  const itemsHtml=items.map(item=>'<div class="cart-item"><div class="cart-item-img">'+(item.image?'<img src="'+item.image+'" alt="'+item.name+'" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;"/>':(item.emoji||'\ud83d\udce6'))+'</div><div class="cart-item-info"><div class="cart-item-name">'+item.name+'</div><div class="cart-item-meta">'+(item.size?'Tam: '+item.size+' \u00b7 ':'')+'Qtd: '+item.qty+'</div></div><div class="cart-item-right"><span class="cart-item-price">R$'+(item.price*item.qty).toFixed(2)+'</span><button class="cart-remove" data-remove="'+item.key+'" title="Remover"><i class="ti ti-trash"></i></button></div></div>').join('');
  const summary=items.length>0?'<div class="cart-summary"><div class="summary-row"><span>Subtotal</span><span>R$'+cartTotal().toFixed(2)+'</span></div><div class="summary-row"><span>Frete</span><span style="color:#4CAF50">A calcular no checkout</span></div><div class="summary-total"><span class="summary-total-lbl">Total</span><span class="summary-total-price">R$'+cartTotal().toFixed(2)+'</span></div></div><button class="checkout-btn">Finalizar Pedido</button><button class="whats-btn" id="whats-btn"><i class="ti ti-brand-whatsapp" style="font-size:20px"></i> Pedir pelo WhatsApp</button>':'';
  return '<div class="cart-view"><button class="detail-back" id="back-btn"><i class="ti ti-arrow-left"></i> Continuar comprando</button><div class="cart-title">Meu Carrinho <span style="color:var(--gold);font-size:.85rem;letter-spacing:1px">('+cartQty()+' itens)</span></div>'+(items.length===0?empty:itemsHtml)+summary+'</div>';
}

function bindEvents(){
  document.querySelectorAll('.cat-btn').forEach(b=>b.addEventListener('click',()=>{ activeCat=b.dataset.cat; view='home'; render(); }));
  document.querySelectorAll('.prod-card').forEach(c=>c.addEventListener('click',e=>{
    if(e.target.closest('.add-btn')||e.target.closest('.quick-view'))return;
    selectedProduct=products.find(p=>p.id===parseInt(c.dataset.prod)); view='detail'; render();
  }));
  document.querySelectorAll('[data-qv]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); selectedProduct=products.find(p=>p.id===parseInt(b.dataset.qv)); view='detail'; render(); }));
  document.querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); const p=products.find(x=>x.id===parseInt(b.dataset.add)); addToCart(p,p.sizes[0],1); }));
  document.querySelectorAll('[data-size]').forEach(b=>b.addEventListener('click',()=>{ if(!selectedProduct)return; selectedSize[selectedProduct.id]=b.dataset.size; render(); }));
  const qm=document.getElementById('qty-minus'); if(qm) qm.addEventListener('click',()=>{ if(!selectedProduct)return; qty[selectedProduct.id]=Math.max(1,(qty[selectedProduct.id]||1)-1); render(); });
  const qp=document.getElementById('qty-plus'); if(qp) qp.addEventListener('click',()=>{ if(!selectedProduct)return; qty[selectedProduct.id]=(qty[selectedProduct.id]||1)+1; render(); });
  const acd=document.getElementById('add-cart-detail'); if(acd) acd.addEventListener('click',()=>{ const p=selectedProduct; addToCart(p,selectedSize[p.id]||p.sizes[0],qty[p.id]||1); view='cart'; render(); });
  const bb=document.getElementById('back-btn'); if(bb) bb.addEventListener('click',()=>{ view='home'; render(); });
  const ct=document.getElementById('cart-toggle-btn'); if(ct) ct.addEventListener('click',()=>{ view=view==='cart'?'home':'cart'; render(); });
  document.querySelectorAll('[data-remove]').forEach(b=>b.addEventListener('click',()=>{ cart=cart.filter(i=>i.key!==b.dataset.remove); updateCartCount(); render(); }));
  const wb=document.getElementById('whats-btn');
  if(wb) wb.addEventListener('click',()=>{
    let msg='Ol\u00e1! Gostaria de fazer um pedido na Trajado Elegante Store:\n\n';
    cart.forEach(i=>{ msg+='\u2022 '+i.name+(i.size?' (Tam: '+i.size+')':'')+' x'+i.qty+' = R$'+(i.price*i.qty).toFixed(2)+'\n'; });
    msg+='\n*Total: R$'+cartTotal().toFixed(2)+'*\n\nPoderia me ajudar a finalizar o pedido?';
    window.open('https://wa.me/5534999999999?text='+encodeURIComponent(msg),'_blank');
  });
}

document.getElementById('admin-toggle-btn').addEventListener('click',()=>{

document.getElementById('admin-login-btn').addEventListener('click', doLogin);

function doLogin(){
  const val=document.getElementById('admin-pass-input').value;
  if(val===ADMIN_PASSWORD){
    adminLoggedIn=true;
    document.getElementById('admin-login-overlay').style.display='none';
    document.getElementById('admin-pass-input').value='';
    document.getElementById('admin-toggle-btn').classList.add('active-panel');
    openAdminPanel();
  } else {
    document.getElementById('admin-login-err').textContent='Senha incorreta. Tente novamente.';
    document.getElementById('admin-pass-input').select();
  }
}

document.getElementById('admin-logout-btn').addEventListener('click',()=>{
  adminLoggedIn=false;
  document.getElementById('admin-panel').classList.remove('open');
  document.getElementById('admin-toggle-btn').classList.remove('active-panel');
  showToast('Sess\u00e3o encerrada');
});
document.getElementById('admin-close-btn').addEventListener('click',()=>{ document.getElementById('admin-panel').classList.remove('open'); });

document.querySelectorAll('.admin-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    adminTab=tab.dataset.tab;
    document.getElementById('tab-add').style.display=adminTab==='add'?'block':'none';
    document.getElementById('tab-list').style.display=adminTab==='list'?'block':'none';
    if(adminTab==='list') renderAdminList();
  });
});

function openAdminPanel(){
  document.getElementById('admin-panel').classList.add('open');
  renderAdminStats();
  if(adminTab==='list') renderAdminList();
}

function renderAdminStats(){
  const total=products.length;
  const cats=[...new Set(products.map(p=>p.cat))].length;
  const withImg=products.filter(p=>p.image).length;
  document.getElementById('admin-stats').innerHTML='<div class="stat-card"><div class="stat-val">'+total+'</div><div class="stat-lbl">Produtos</div></div><div class="stat-card"><div class="stat-val">'+cats+'</div><div class="stat-lbl">Categorias</div></div><div class="stat-card"><div class="stat-val">'+withImg+'</div><div class="stat-lbl">Com Foto</div></div>';
}

function renderAdminList(){
  const list=document.getElementById('admin-prod-list');
  if(products.length===0){ list.innerHTML='<div class="admin-empty">Nenhum produto no cat\u00e1logo</div>'; return; }
  list.innerHTML=products.map(p=>'<div class="admin-prod-item"><div class="admin-prod-thumb">'+(p.image?'<img src="'+p.image+'" alt="'+p.name+'"/>':(p.emoji||getEmojiForCat(p.cat)))+'</div><div class="admin-prod-info"><div class="admin-prod-name">'+p.name+'</div><div class="admin-prod-meta">'+p.cat+' \u00b7 '+p.sizes.join(', ')+(p.badge?' \u00b7 <span style="color:var(--gold)">'+p.badge+'</span>':'')+'</div></div><span class="admin-prod-price">R$'+p.price+'</span><button class="admin-delete-btn" onclick="deleteProduct('+p.id+')" title="Remover"><i class="ti ti-trash"></i></button></div>').join('');
}

document.getElementById('img-file-input').addEventListener('change',function(){ handleImageUpload(this); });

function handleImageUpload(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    currentImageData=e.target.result;
    document.getElementById('img-upload-area').classList.add('has-img');
    document.getElementById('img-placeholder').style.display='none';
    const wrap=document.getElementById('img-preview-wrap'); wrap.style.display='flex';
    document.getElementById('img-preview').src=currentImageData;
  };
  reader.readAsDataURL(file);
}

function removeImage(){
  currentImageData=null;
  document.getElementById('img-file-input').value='';
  document.getElementById('img-upload-area').classList.remove('has-img');
  document.getElementById('img-placeholder').style.display='';
  document.getElementById('img-preview-wrap').style.display='none';
}

document.getElementById('admin-submit-btn').addEventListener('click', addProduct);

function addProduct(){
  const name=document.getElementById('f-name').value.trim();
  const cat=document.getElementById('f-cat').value;
  const price=parseFloat(document.getElementById('f-price').value);
  const oldVal=parseFloat(document.getElementById('f-old').value)||null;
  const badge=document.getElementById('f-badge').value||null;
  const desc=document.getElementById('f-desc').value.trim();
  const tagsRaw=document.getElementById('f-tags').value.trim();
  const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):[];
  const sizes=[...document.querySelectorAll('#sizes-check input:checked')].map(i=>i.value);
  if(!name){ showToast('Informe o nome do produto'); return; }
  if(!cat){ showToast('Selecione uma categoria'); return; }
  if(!price||isNaN(price)){ showToast('Informe o pre\u00e7o'); return; }
  if(sizes.length===0){ showToast('Selecione ao menos um tamanho'); return; }
  const newId=products.length>0?Math.max(...products.map(p=>p.id))+1:1;
  products.push({id:newId,name,cat,price,old:oldVal,badge,emoji:getEmojiForCat(cat),image:currentImageData||null,desc,sizes,tags});
  saveProducts(); render(); renderAdminStats();
  showToast('"'+name+'" adicionado ao cat\u00e1logo!');
  document.getElementById('f-name').value='';
  document.getElementById('f-cat').value='';
  document.getElementById('f-price').value='';
  document.getElementById('f-old').value='';
  document.getElementById('f-badge').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-tags').value='';
  document.querySelectorAll('#sizes-check input').forEach(i=>i.checked=false);
  removeImage();
}

function deleteProduct(id){
  const p=products.find(x=>x.id===id); if(!p) return;
  if(!confirm('Remover "'+p.name+'" do cat\u00e1logo?')) return;
  products=products.filter(x=>x.id!==id);
  saveProducts(); render(); renderAdminStats(); renderAdminList();
  showToast('Produto removido');
}

render();
</script>
</body>
</html>
